<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow -->
  <circle cx="900" cy="100" r="300" fill="#3b82f6" opacity="0.08"/>
  <circle cx="200" cy="500" r="250" fill="#8b5cf6" opacity="0.06"/>
  <!-- Brand -->
  <text x="100" y="200" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accent)">Shooting Cut</text>
  <text x="100" y="200" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accent)">Shooting Cut&#8482;</text>
  <!-- Tagline -->
  <text x="100" y="280" font-family="Inter, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">Smart Video Analysis for Competitive Shooters</text>
  <!-- Features -->
  <text x="100" y="370" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#60a5fa">FFT Shot Detection</text>
  <text x="100" y="405" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#60a5fa">Auto Trim &amp; Performance Subtitles</text>
  <text x="100" y="440" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#60a5fa">Split Sync &amp; Multi-Cam Stage Mix</text>
  <!-- Disciplines -->
  <rect x="100" y="490" width="100" height="36" rx="8" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="150" y="514" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#60a5fa" text-anchor="middle">IPSC</text>
  <rect x="220" y="490" width="110" height="36" rx="8" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="275" y="514" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#60a5fa" text-anchor="middle">USPSA</text>
  <rect x="350" y="490" width="100" height="36" rx="8" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="400" y="514" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#60a5fa" text-anchor="middle">IDPA</text>
  <!-- Platforms -->
  <text x="100" y="580" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#64748b">macOS · iPad · iPhone</text>
  <!-- App Store badge area -->
  <rect x="830" y="480" width="260" height="56" rx="12" fill="url(#accent)"/>
  <text x="960" y="515" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">Download on App Store</text>
</svg>